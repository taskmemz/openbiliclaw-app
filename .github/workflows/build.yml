name: Build Flutter App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release (draft)'
        required: false
        default: false
        type: boolean

env:
  FLUTTER_VERSION: '3.27.0'

jobs:
  build:
    name: Build APKs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Flutter info
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub || true

      # ── Release 签名（可选）──
      - name: Decode keystore
        if: ${{ secrets.ANDROID_RELEASE_KEY != '' }}
        env:
          ANDROID_RELEASE_KEY: ${{ secrets.ANDROID_RELEASE_KEY }}
        run: echo "$ANDROID_RELEASE_KEY" | base64 -d > /tmp/upload-keystore.jks

      - name: Write key.properties
        if: ${{ secrets.ANDROID_RELEASE_KEY != '' }}
        env:
          PWD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
        run: |
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=upload\nstoreFile=/tmp/upload-keystore.jks\n' "$PWD" "$PWD" > android/key.properties

      # ── 构建 ──
      - name: Build APK (debug)
        run: flutter build apk --debug

      - name: Build APK (release)
        run: flutter build apk --release

      # ── 上传产物 ──
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: openbiliclaw-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: openbiliclaw-app-release
          path: build/app/outputs/flutter-apk/app-release.apk

      # ── Release ──
      - name: Get version
        if: ${{ github.event.inputs.create_release == 'true' }}
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: ${{ github.event.inputs.create_release == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: "OpenBiliClaw App ${{ steps.version.outputs.version }}"
          artifacts: "build/app/outputs/flutter-apk/app-release.apk,build/app/outputs/flutter-apk/app-debug.apk"
          generateReleaseNotes: true
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}
