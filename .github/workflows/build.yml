name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true
      - name: Build APK
        run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: openbiliclaw-android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build-web:
    name: Web (static)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.9
          cache: true
      - name: Build Web
        run: flutter build web --release
      - uses: actions/upload-artifact@v4
        with:
          name: openbiliclaw-web
          path: build/web
